<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earthquake Monitor</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#alert {
  display: none;
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  background: rgba(0, 0, 0, 0.75);
  color: white;
  padding: 25px 40px;
  border-radius: 12px;
  font-size: 22px;
  text-align: center;

  border: 2px solid red;
  box-shadow: 0 0 20px red;
}

.show {
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%   { box-shadow: 0 0 10px red; }
  50%  { box-shadow: 0 0 30px red; }
  100% { box-shadow: 0 0 10px red; }
}

#timeAgo {
  margin-top: 10px;
  font-size: 14px;
  color: #ccc;
}

#details {
  margin-top: 10px;
  font-size: 13px;
  color: #aaa;
}
</style>
</head>
<body>

<div id="alert">
  <div id="content"></div>
  <div id="details"></div>
  <div id="timeAgo"></div>
</div>

<script>
var API_URL = "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson";
var ALERT_SOUND_URL = "https://github.com/protectorebay/Earth/raw/refs/heads/main/earth.MP3";

var alertSound = new Audio(ALERT_SOUND_URL);
alertSound.volume = 1.0;

var lastEventId = null;
var eventTime = null;
var timerInterval = null;

function checkEarthquakes() {
  fetch(API_URL)
    .then(function(res) { return res.json(); })
    .then(function(data) {

      if (!data || !data.features || data.features.length === 0) return;

      var latest = data.features[0];

      if (!latest || !latest.id) return;

      if (latest.id !== lastEventId) {
        lastEventId = latest.id;
        showAlert(latest);
      }

    })
    .catch(function(err) {
      console.log("API error:", err);
    });
}

function typeWriter(el, text, speed) {
  el.innerHTML = "";
  var i = 0;

  function write() {
    if (i < text.length) {
      var c = text.charAt(i);
      if (c === "\n") {
        el.innerHTML += "<br>";
      } else {
        el.innerHTML += c;
      }
      i++;
      setTimeout(write, speed);
    }
  }

  write();
}

function showAlert(event) {
  var alertBox = document.getElementById("alert");
  var content = document.getElementById("content");
  var details = document.getElementById("details");

  var props = event.properties;
  var coords = event.geometry.coordinates;

  if (!props || !coords) return;

  var place = props.place || "Unknown";
  var mag = props.mag;
  if (mag === null || mag === undefined) mag = "?";

  var depth = coords[2];
  if (!depth) depth = 0;

  var lat = coords[1];
  var lon = coords[0];

  var type = props.type || "earthquake";

  eventTime = props.time;

  var utc = new Date(eventTime).toUTCString();

  var mainText =
"⚠️ NEW EARTHQUAKE\n\n📍 " + place + "\n\n💥 Magnitude: " + mag;

  var detailText =
"<b>GPS: " + lat.toFixed(3) + ", " + lon.toFixed(3) + "</b>\n" +
"<b>Depth: " + depth.toFixed(1) + " km</b>\n" +
"<b>Type: " + type + "</b>\n" +
"<b>UTC: " + utc + "</b>";

  alertBox.style.display = "block";
  alertBox.className = "show";

  typeWriter(content, mainText, 15);

  setTimeout(function() {
    typeWriter(details, detailText, 8);
  }, 400);

  try {
    alertSound.currentTime = 0;
    alertSound.play();
  } catch (e) {}

  if (timerInterval) clearInterval(timerInterval);
  updateTimeAgo();
  timerInterval = setInterval(updateTimeAgo, 1000);
}

function updateTimeAgo() {
  if (!eventTime) return;

  var now = Date.now();
  var diff = Math.floor((now - eventTime) / 1000);

  var minutes = Math.floor(diff / 60);
  var seconds = diff % 60;

  if (seconds < 10) seconds = "0" + seconds;
  if (minutes < 10) minutes = "0" + minutes;

  document.getElementById("timeAgo").innerText = minutes + ":" + seconds + " ago";
}

setInterval(checkEarthquakes, 60000);
checkEarthquakes();

</script>

</body>
</html>
